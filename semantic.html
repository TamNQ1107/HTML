<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--
        Semantic HTML là một phần quan trọng của việc xây dựng trang web, giúp cải thiện khả năng truy cập, SEO và trải nghiệm người dùng. Dưới đây là một số thẻ HTML5 phổ biến được sử dụng để tạo cấu trúc semantically:

        1. <header>: Đại diện cho phần đầu của một trang hoặc một section, thường chứa logo, tiêu đề và điều hướng.
        2. <nav>: Đại diện cho phần điều hướng của trang, chứa các liên kết đến các phần khác nhau của trang web.
        3. <main>: Đại diện cho nội dung chính của trang, chỉ nên xuất hiện một lần trên mỗi trang.
        4. <article>: Đại diện cho một bài viết hoặc một phần nội dung độc lập, có thể được tái sử dụng hoặc chia sẻ.
        5. <section>: Đại diện cho một phần của tài liệu, thường có tiêu đề riêng và chứa các nội dung liên quan.
        6. <aside>: Đại diện cho nội dung phụ hoặc thông tin bổ sung, thường được đặt ở bên cạnh nội dung chính.
        7. <footer>: Đại diện cho phần chân trang của một trang hoặc một section, thường chứa thông tin bản quyền, liên kết đến chính sách bảo mật và các liên kết khác.

        Sử dụng các thẻ này giúp cải thiện khả năng truy cập của trang web đối với người dùng và công cụ tìm kiếm, đồng thời làm cho mã nguồn trở nên dễ đọc và bảo trì hơn.
    -->
</head>
<body>
    <header><!--logo--></header>
        <h1>Michael Jackson</h1>
    <section>
        <h2>Famous Songs</h2>
        <ul>
            <li>Thriller</li>
            <li>Billie Jean</li>
            <li>Beat It</li>
        </ul>
    </section>
    
</body>
</html>
